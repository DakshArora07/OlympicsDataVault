{% extends "layout.html" %}
{% block title %}Edit {{ venue.name }}{% endblock %}
{% block breadcrumb %}Registration &rsaquo; Venues &rsaquo; {{ venue.name }} &rsaquo; Edit{% endblock %}

{% block content %}
<div class="flex-between mb-16">
    <div>
        <div class="page-title">Edit Venue</div>
        <div class="page-subtitle">{{ venue.name }}</div>
    </div>
    <a href="{{ url_for('venue_detail', venue_id=venue.venue_id) }}"
       class="btn btn-secondary">Cancel</a>
</div>

<div class="card" style="max-width:520px;">
    <div class="card-header">Venue Details</div>
    <div class="card-body">
        <form method="POST"
              action="{{ url_for('edit_venue', venue_id=venue.venue_id) }}">
            <div class="form-group">
                <label class="form-label">Name *</label>
                <input type="text" name="name" class="form-control"
                       value="{{ venue.name }}" required maxlength="100">
            </div>
            <div class="form-group">
                <label class="form-label">City *</label>
                <input type="text" name="city" class="form-control"
                       value="{{ venue.city }}" required maxlength="60">
            </div>
            <div class="form-group">
                <label class="form-label">Country *</label>
                <input type="text" name="country" class="form-control"
                       value="{{ venue.country }}" required maxlength="60">
            </div>
            <div class="form-group">
                <label class="form-label">Capacity *</label>
                <input type="number" name="capacity" class="form-control"
                       value="{{ venue.capacity }}" required min="1">
            </div>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('venue_detail', venue_id=venue.venue_id) }}"
                   class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
