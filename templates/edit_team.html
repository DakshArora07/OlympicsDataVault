{% extends "layout.html" %}
{% block title %}Edit Team #{{ team.team_id }}{% endblock %}
{% block breadcrumb %}Registration &rsaquo; Teams &rsaquo; Team #{{ team.team_id }} &rsaquo; Edit{% endblock %}

{% block content %}
<div class="flex-between mb-16">
    <div>
        <div class="page-title">Edit Team #{{ team.team_id }}</div>
        <div class="page-subtitle">{{ team.country_name }}</div>
    </div>
    <a href="{{ url_for('team_detail', team_id=team.team_id, country_code=team.country_code) }}"
       class="btn btn-secondary">Cancel</a>
</div>

<div class="card" style="max-width:520px;">
    <div class="card-header">Team Details</div>
    <div class="card-body">
        <form method="POST"
              action="{{ url_for('edit_team', team_id=team.team_id, country_code=team.country_code) }}">
            <div class="form-group">
                <label class="form-label">Country</label>
                <input type="text" class="form-control" value="{{ team.country_name }}" disabled>
            </div>
            <div class="form-group">
                <label class="form-label">Number of Players *</label>
                <input type="number" name="number_of_players" class="form-control"
                       value="{{ team.number_of_players }}" min="1" required>
            </div>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('team_detail', team_id=team.team_id, country_code=team.country_code) }}"
                   class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
